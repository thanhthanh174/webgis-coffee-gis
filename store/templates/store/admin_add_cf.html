{% load static %}

<link rel="stylesheet" href="{% static 'store/add_cf.css' %}">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Search -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<form method="POST" enctype="multipart/form-data" class="form-box">
    <h2>THÊM QUÁN</h2>
    {% csrf_token %}

    <!-- ROW 1 -->
    <div class="row">
        <div class="col">
            <label>Tên quán:</label>
            {{ form.name }}
        </div>

        <div class="col">
            <label>Địa chỉ:</label>
            {{ form.address }}
        </div>
    </div>

    <!-- ROW 2 -->
    <div class="row">
        <div class="col">
            <label>Ảnh:</label>
            {{ form.image }}
        </div>
    </div>

    <!-- MAP -->
    <label>Chọn vị trí trên bản đồ:</label>
    <div id="map" style="height: 400px; margin-bottom: 15px;"></div>

    <!-- LAT LNG -->
    <div class="row">
        <div class="col">
            <label>Latitude:</label>
            <input type="text" id="lat" name="lat" readonly>
        </div>

        <div class="col">
            <label>Longitude:</label>
            <input type="text" id="lng" name="lng" readonly>
        </div>
    </div>

    <button type="submit">Lưu</button>
    <a href="{% url 'store:admin_dashboard' %}" class="back-link">⬅ Quay lại</a>
</form>
<script>
var map = L.map('map').setView([10.7769, 106.7009], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// search địa điểm
L.Control.geocoder({
    defaultMarkGeocode: true
}).addTo(map);

var marker;

map.on('click', function(e){
    var lat = e.latlng.lat;
    var lng = e.latlng.lng;

    if(marker){
        map.removeLayer(marker);
    }

    marker = L.marker([lat, lng]).addTo(map);

    document.getElementById('lat').value = lat.toFixed(6);
    document.getElementById('lng').value = lng.toFixed(6);
});

window.addEventListener("load", function(){
    map.invalidateSize();
});
</script>
