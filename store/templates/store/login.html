<html lang="vi">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoffeeGIS - KATINAT - Đăng nhập</title>
    <link rel="stylesheet" href="{% static 'login.css' %}">
    <link rel="stylesheet" href="{% static 'responsive.css' %}">
    <link rel="icon" type="image/x-icon" href="{% static 'admin/images/logo-katinat.webp' %}">
</head>
<body>
    <form method="POST">
        <h2>Đăng nhập</h2>
        {% csrf_token %}

        <label>Username:</label>
        <input type="text" name="username">

        <div class="password-box">
            <label>Password:</label>
            <input type="password" name="password" id="password1">
            <span onclick="togglePassword('password1', this)">👁</span>
        </div>

        <!-- ERROR -->
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <button type="submit">Đăng nhập</button>
        
        <p class="forgot-password">
            <a href="{% url 'store:forgot_password' %}">Quên mật khẩu?</a>
        </p>

        <p class="form-text">
            Chưa có tài khoản?
            <a href="{% url 'store:register' %}" class="register-link">Đăng ký</a>
        </p>
        <a href="{% url 'store:dashboard' %}" class="back-btn">⬅ Quay lại</a>
    </form>

<script>
function togglePassword(id, el) {
    const input = document.getElementById(id);
    if (input.type === "password") {
        input.type = "text";
        el.textContent = "🙈";
    } else {
        input.type = "password";
        el.textContent = "👁";
    }
}
</script>
</body>
</html>
