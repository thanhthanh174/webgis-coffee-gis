{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bản đồ quán cà phê</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>
<link rel="icon" type="image/x-icon" href="{% static 'admin/images/logo-katinat.webp' %}">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
/* ===== NAVBAR ===== */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 70px;
    background: #2f3e46;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    z-index: 2000;
    box-sizing: border-box;
}

/* MENU */
.menu {
    display: flex;
    align-items: center;
    gap: 20px;
}

.menu a {
    color: white;
    text-decoration: none;
    font-size: 16px;
    white-space: nowrap;
}

/* ===== MAP ===== */
.map-container {
    position: relative;
    margin-top: 70px;
}

/* ===== HEADER ===== */
.topbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 70px;
    padding: 0 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(15, 32, 39, 0.9);
    backdrop-filter: blur(6px);
    z-index: 1000;
}

/* LOGO */
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 22px;
    font-weight: bold;
    color: #fff;
}

.logo-icon {
    width: 28px;
    height: 28px;
}

/* ===== MENU ===== */
.topbar nav {
    display: flex;
    align-items: center;
    gap: 25px; /* 👈 khoảng cách đều giữa các mục */
}

/* LINK */
.topbar a {
    color: #f5f5f5;
    text-decoration: none;
    font-size: 16px;
    transition: 0.3s;
}

.topbar a:hover {
    color: #cfa36a;
}

/* ===== FIX FORM LOGOUT ===== */
.topbar form {
    display: inline;
    margin-left: 30px; /* 👈 đẩy nút logout ra xa */
}

/* ===== LOGIN / LOGOUT BUTTON ===== */
.login-btn {
    background: #c89b6d;
    color: #fff;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 14px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

/* Hover */
.login-btn:hover {
    background: #e6b980;
    transform: translateY(-1px);
}

/* ===== INFO BOX (BÊN PHẢI) ===== */
.info-box {
    position: absolute;
    top: 90px;
    right: 20px;
    width: 320px;
    background: #fff;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    z-index: 1000;
    display: none;
    max-height: 80vh;
    overflow-y: auto;
    z-index: 1000;
}

/* ===== FILTER PANEL (BÊN TRÁI) ===== */
.filter-panel {
    position: absolute;
    top: 90px;
    left: 20px;
    background: white;
    padding: 15px;
    border-radius: 12px;
    z-index: 1000;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    width: 250px;
}

/* ===== ROUTING PANEL ===== */
.leaflet-routing-container {
    position: absolute !important;
    bottom: 20px !important;
    left: 20px !important;
    z-index: 900 !important;
    max-width: 300px;
    background: white;
}

/* ===== ZOOM BUTTON (+ -) ===== */
.leaflet-control-zoom {
    top: auto !important;
    bottom: 200px !important;  
    left: 10px !important;
    z-index: 900;
}

/* ===== BUTTON ===== */
.transport button,
.gis-btn {
    margin: 5px 2px;
    cursor: pointer;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    transition: 0.2s;
}

.transport button:hover,
.gis-btn:hover {
    background: #eee;
}

.btn-primary {
    background: #007bff;
    color: white;
    border: none;
    width: 100%;
    margin-top: 5px;
}

.btn-success {
    background: #28a745;
    color: white;
    border: none;
    width: 100%;
    margin-top: 5px;
}

/* ===== REVIEW ===== */
.review-box {
    max-height: 150px;
    overflow: auto;
    border: 1px solid #ddd;
    padding: 6px;
    margin-top: 6px;
    font-size: 0.9em;
    border-radius: 6px;
}

/* INPUT */
input, textarea {
    width: 100%;
    margin-top: 5px;
    padding: 8px;
    box-sizing: border-box;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    .info-box {
        width: 90%;
        right: 5%;
    }

    .filter-panel {
        width: 90%;
        left: 5%;
    }

    .leaflet-routing-container {
        width: 90% !important;
        left: 5% !important;
    }
}
</style>
</head>

<body>
    <div class="navbar">
    <b>KATINAT CoffeeGIS</b>
    <div class="menu">
        <a href="/store/">Trang chủ</a>
        <a href="/store/list/">Chi nhánh</a>
        <a href="/">Bản đồ</a>
        {% if user.is_authenticated %}
            <form method="POST" action="{% url 'store:logout' %}">
                {% csrf_token %}
                <button type="submit" class="login-btn">Đăng xuất</button>
            </form>
        {% else %}
            <a href="{% url 'store:login' %}" class="login-btn">Đăng nhập</a>
        {% endif %}
    </div>
</div>
<div id="map" style="width:100%; height:100vh;"></div>

<div class="filter-panel">
    <b>🔎 Lọc quán theo bán kính (km)</b>
    <input type="number" id="radiusInput" placeholder="Nhập km (vd: 2, 5...)" step="0.5">
    <button onclick="filterByRadius()" class="btn-primary" style="margin-top:5px; padding:5px;">🎯 Lọc ngay</button>
<button onclick="showAllCafes()" class="btn-success" style="margin-top:5px; padding:5px;">👀 Hiện tất cả</button>
</div>

<div class="info-box" id="infoBox">
    <h3 id="cafeName" style="margin-top:0;"></h3>
    <img id="cafeImage" style="width:100%;height:160px;object-fit:cover;border-radius:8px;display:none;margin-bottom:10px;">
    <p id="cafeAddress" style="color:#666; font-size:0.9em;"></p>
    
    <p>🕒 <b>Giờ mở cửa:</b> <span id="openingHours"></span></p>

    <p>📏 Khoảng cách: <span id="distance"></span> km</p>
    <p>⏱ Thời gian: <span id="duration"></span> phút</p>

    <div class="transport">
        <b>Phương tiện:</b>
        <button id="walkBtn">🚶</button>
        <button id="bikeBtn">🏍</button>
        <button id="carBtn">🚗</button>
    </div>

    <button id="routeBtn" class="btn-primary" style="margin-top:10px;">📍 Chỉ đường</button>
    <button id="nearestBtn" class="btn-success" style="margin-top:5px;">🚩 Tìm quán gần nhất</button>

    <hr>
    <b>⭐ Đánh giá</b>
    <p>⭐ Trung bình: <span id="avgRating">0</span>/5</p>
    <div id="reviewList" class="review-box"></div>
<input id="reviewName" placeholder="Tên của bạn">
    <input id="reviewRating" type="number" min="1" max="5" placeholder="Số sao (1-5)">
    <textarea id="reviewComment" placeholder="Nhận xét của bạn..."></textarea>
    <button id="sendReview" class="btn-primary" style="margin-top:8px;">Gửi đánh giá</button>
</div>

<script id="cafes-data" type="application/json">
{{ cafes|safe }}
</script>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
let cafes = JSON.parse(document.getElementById("cafes-data").textContent || "[]");
let map = L.map('map').setView([10.77, 106.68], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let userLat=null;
let userLng=null;
let selectedCafe=null;
let routingControl=null;
let currentMode="walk";
let cafeMarkers=[];

const cafeIcon=L.icon({
    iconUrl:"https://maps.gstatic.com/mapfiles/ms2/micons/coffeehouse.png",
    iconSize:[32,32]
});

// Lấy vị trí người dùng
navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;
    userLng=pos.coords.longitude;
    L.marker([userLat,userLng], {title: "Vị trí của bạn"}).addTo(map);
    map.setView([userLat,userLng],13);
}, err => {
    alert("Vui lòng bật GPS để sử dụng tính năng GIS!");
});

// Hiển thị markers
cafes.forEach(cafe=>{
    const marker=L.marker([cafe.lat,cafe.lng],{icon:cafeIcon}).addTo(map);
    cafeMarkers.push({cafe, marker});

    marker.on("click",()=>{
        selectedCafe=cafe;
        document.getElementById("infoBox").style.display="block";
        document.getElementById("cafeName").innerText=cafe.name;
        document.getElementById("cafeAddress").innerText=cafe.address;
document.getElementById("openingHours").innerText=cafe.opening_hours || "08:00 - 22:00";

        if(cafe.image){
            let img=document.getElementById("cafeImage");
            img.src=cafe.image;
            img.style.display="block";
        } else {
            document.getElementById("cafeImage").style.display="none";
        }

        updateDistanceTime();
        loadReviews();
    });
});

// Hàm tính khoảng cách
function haversine(lat1,lon1,lat2,lon2){
    const R=6371;
    const dLat=(lat2-lat1)*Math.PI/180;
    const dLon=(lon2-lon1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+
        Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// Lọc theo bán kính 
function filterByRadius() {
    let r = parseFloat(document.getElementById("radiusInput").value);
    if(isNaN(r) || userLat === null) {
        alert("Nhập số km và bật vị trí!");
        return;
    }
    cafeMarkers.forEach(item => {
        let d = haversine(userLat, userLng, item.cafe.lat, item.cafe.lng);
        if(d <= r) map.addLayer(item.marker);
else map.removeLayer(item.marker);
    });
}

function showAllCafes() {
    cafeMarkers.forEach(item => map.addLayer(item.marker));
}

function updateDistanceTime(){
    if(!selectedCafe||userLat===null)return;
    const dist=haversine(userLat,userLng,selectedCafe.lat,selectedCafe.lng);
    let speed=4; // đi bộ
    if(currentMode==="bike") speed=20;
    if(currentMode==="car") speed=35;
    const time=(dist/speed)*60;
    document.getElementById("distance").innerText=dist.toFixed(2);
    document.getElementById("duration").innerText=Math.round(time);
}

document.getElementById("walkBtn").onclick=()=>{currentMode="walk";updateDistanceTime();}
document.getElementById("bikeBtn").onclick=()=>{currentMode="bike";updateDistanceTime();}
document.getElementById("carBtn").onclick=()=>{currentMode="car";updateDistanceTime();}

document.getElementById("routeBtn").onclick=()=>{
    if(!selectedCafe||userLat===null)return;
    if(routingControl) map.removeControl(routingControl);
    routingControl=L.Routing.control({
        waypoints:[L.latLng(userLat,userLng), L.latLng(selectedCafe.lat,selectedCafe.lng)],
        lineOptions: { styles: [{ color: 'blue', opacity: 0.6, weight: 6 }] }
    }).addTo(map);
};

document.getElementById("nearestBtn").onclick=()=>{
    if(userLat===null)return;
    let nearest=null;
    let min=Infinity;
    cafeMarkers.forEach(item=>{
        const d=haversine(userLat,userLng,item.cafe.lat,item.cafe.lng);
        if(d<min){min=d;nearest=item;}
    });
    if(nearest) {
        map.setView([nearest.cafe.lat,nearest.cafe.lng],16);
        nearest.marker.fire('click');
    }
};

// LOGIC ĐÁNH GIÁ 
function loadReviews(){
    fetch(`/api/review/${selectedCafe.id}/`)
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("avgRating").innerText=data.avg_rating || 0;
let html="";
        data.reviews.forEach(r=>{
            html+=`<p><b>${r.name}</b> ⭐${r.rating}<br>${r.comment}</p><hr>`;
        });
        document.getElementById("reviewList").innerHTML=html||"Chưa có đánh giá";
    });
}

document.getElementById("sendReview").onclick=()=>{
    const name = document.getElementById("reviewName").value;
    const star = document.getElementById("reviewRating").value;
    if(!name || !star) { alert("Nhập đủ tên và số sao!"); return; }
    
    fetch("/api/review/add/",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            cafe_id:selectedCafe.id,
            name:name,
            rating:star,
            comment:document.getElementById("reviewComment").value
        })
    })
    .then(()=> {
        loadReviews();
        document.getElementById("reviewName").value = "";
        document.getElementById("reviewRating").value = "";
        document.getElementById("reviewComment").value = "";
    });
};

const params = new URLSearchParams(window.location.search);
const lat = params.get("lat");
const lon = params.get("lon");

if(lat && lon){
    map.setView([lat, lon], 16);
    L.marker([lat, lon]).addTo(map);
}

</script>
</body>
</html>
